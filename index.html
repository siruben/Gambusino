<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caçador de Gambusinos</title>

<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#000000">
<link rel="icon" href="assets/icon.png">
</head>

<body>

<div id="cave">
  <div id="stars"></div>
</div>

<!-- DARKNESS OVERLAY -->
<div id="darkness"></div>

<!-- BEAM -->
<div id="beam-container">
  <div id="beam"></div>
</div>

<!-- NUGGETS -->
<div id="nuggets-container"></div>

<!-- HUD -->
<div id="hud">
  <div>
    <div class="hud-label">Gambusinos</div>
    <div class="hud-value" id="score">0</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label">Nível</div>
    <div class="hud-value" id="level-display">1</div>
  </div>
</div>

<!-- TIMER BAR -->
<div id="timer-bar-wrap">
  <div id="timer-bar"></div>
</div>

<!-- GYRO HINT -->
<div id="gyro-hint">A luz varre a mina — toca nos gambusinos!</div>

<!-- LEVEL MESSAGE -->
<div id="level-msg" class="hidden"></div>

<!-- TORCH BUTTON -->
<button id="torch-btn" aria-label="Ligar lanterna">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:#B8860B">
    <path d="M9 2h6l2 6H7L9 2z"></path>
    <path d="M7 8l1 8h8l1-8"></path>
    <path d="M10 16v4m4-4v4"></path>
    <path d="M8 20h8"></path>
    <line x1="12" y1="2" x2="12" y2="0"></line>
    <line x1="5" y1="4" x2="3.5" y2="2.5"></line>
    <line x1="19" y1="4" x2="20.5" y2="2.5"></line>
  </svg>
</button>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <div id="stars2" style="position:absolute;inset:0;overflow:hidden;pointer-events:none"></div>
  <div style="position:relative;z-index:1;width:100%">
    <div class="screen-title" id="start-title">Caçador de Gambusinos</div>
    <div class="screen-sub">A Mina Perdida</div>
    <div class="divider"></div>
    <p class="screen-desc">
      A mina está às escuras.<br>
      O feixe de luz varre a escuridão da esquerda para a direita.<br>
      Quando a luz tocar um gambusino — toca nele!
    </p>
    <button class="btn-primary" id="start-btn">ENTRAR NA MINA</button>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen hidden" id="end-screen">
  <div style="position:relative;z-index:1;width:100%">
    <div class="screen-title" id="end-title">Fim da Jornada</div>
    <div class="screen-sub" id="end-sub">O tempo esgotou-se</div>
    <div class="divider"></div>
    <p class="screen-desc" id="end-desc"></p>
    <button class="btn-primary" id="restart-btn">VOLTAR À MINA</button>
  </div>
</div>

<audio id="bg-music" src="Gambusinos.mp3" loop></audio>
<script src="script.js"></script>
</body>
</html>
